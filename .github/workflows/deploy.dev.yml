name: Deploy to Staging

on:
  push:
    branches:
      - dev
    paths:
      - 'codeanew/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -w codeanew
        env:
          VITE_DIRECTUS_URL: ${{ secrets.VITE_DIRECTUS_URL }}

      - name: Clear old build on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_KEY }}
          port: ${{ secrets.DO_PORT }}
          script: rm -rf /var/www/dev.codeanew.com/*

      - name: Upload new build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_KEY }}
          port: ${{ secrets.DO_PORT }}
          source: "codeanew/build/*"
          target: "/var/www/dev.codeanew.com"
          strip_components: 2