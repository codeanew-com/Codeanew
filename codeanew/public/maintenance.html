  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Manrope', sans-serif;
      background-color: #12122e;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(240,165,0,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      max-width: 560px;
      width: 100%;
      animation: fadeUp 0.7s ease both;
    }

    .logo {
      height: 40px;
      width: auto;
      margin-bottom: 3rem;
      opacity: 0.95;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(240,165,0,0.12);
      border: 1px solid rgba(240,165,0,0.25);
      color: #F0A500;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      margin-bottom: 1.75rem;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #F0A500;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
      color: #ffffff;
    }

    h1 span {
      color: #F0A500;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      color: rgba(255,255,255,0.6);
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #F0A500;
      border-radius: 2px;
      margin: 0 auto 2.5rem;
      opacity: 0.6;
    }

    .contact {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.5);
      font-size: 0.875rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact:hover { color: #F0A500; }

    .contact svg {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }
  </style>
</head>
